services:
  backend:
    image: python:3.13-slim
    working_dir: /app/backend
    command: sh -c "pip install -r requirements.txt && uvicorn main:app --host 0.0.0.0 --port 8001"
    environment:
      PROJECT_TTL_HOURS: ${PROJECT_TTL_HOURS:-6}
      PROJECT_CLEANUP_INTERVAL_MINUTES: ${PROJECT_CLEANUP_INTERVAL_MINUTES:-30}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    ports:
      - "8001:8001"
    volumes:
      - .:/app

  frontend:
    image: node:22
    working_dir: /app/frontend
    command: sh -c "npm install && npm run dev -- -p 3001"
    environment:
      NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-http://localhost:8001}
    ports:
      - "3001:3001"
    volumes:
      - .:/app
    depends_on:
      - backend
